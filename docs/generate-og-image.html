<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Generate OG image — Mafia Village · ADK</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,600;1,9..144,400;1,9..144,600&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #0e0d0b; }
  body { width: 1200px; height: 630px; overflow: hidden; }
  svg { display: block; width: 1200px; height: 630px; }
</style>
</head>
<body>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0e0d0b"/>
      <stop offset="55%" stop-color="#16140f"/>
      <stop offset="100%" stop-color="#0e0d0b"/>
    </linearGradient>
    <radialGradient id="glowOrange" cx="0.78" cy="0.28" r="0.55">
      <stop offset="0%" stop-color="#ff5b1f" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ff5b1f" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowTeal" cx="0.18" cy="0.85" r="0.45">
      <stop offset="0%" stop-color="#5fb3a3" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#5fb3a3" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grain" x="0" y="0" width="36" height="36" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="0.9" fill="#f4ecd8" fill-opacity="0.025"/>
      <circle cx="20" cy="14" r="0.6" fill="#f4ecd8" fill-opacity="0.018"/>
    </pattern>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0.3">
      <stop offset="0%" stop-color="#ffc857"/>
      <stop offset="100%" stop-color="#ff5b1f"/>
    </linearGradient>
  </defs>

  <!-- background layers -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grain)"/>
  <rect width="1200" height="630" fill="url(#glowOrange)"/>
  <rect width="1200" height="630" fill="url(#glowTeal)"/>

  <!-- left accent bar (the wolf scar) -->
  <rect x="0" y="0" width="5" height="630" fill="#ff5b1f"/>

  <!-- ===================== RIGHT SIDE: the village ring ===================== -->
  <g transform="translate(925,318)">
    <!-- outer dashed orbit -->
    <circle cx="0" cy="0" r="190" fill="none" stroke="#2b2823" stroke-width="1" stroke-dasharray="2,7"/>
    <!-- inner dashed orbit -->
    <circle cx="0" cy="0" r="120" fill="none" stroke="#2b2823" stroke-width="1" stroke-dasharray="2,5" opacity="0.5"/>

    <!-- daytime accusation lines (teal, between villagers) -->
    <g stroke="#5fb3a3" stroke-opacity="0.28" stroke-width="1.2">
      <line x1="0"    y1="-160" x2="160"  y2="0"/>
      <line x1="160"  y1="0"    x2="0"    y2="160"/>
      <line x1="0"    y1="160"  x2="-160" y2="0"/>
      <line x1="-113" y1="113"  x2="113"  y2="-113"/>
    </g>

    <!-- nighttime whisper (wolves to each other) -->
    <g stroke="#ff5b1f" stroke-opacity="0.7" stroke-width="1.6" stroke-dasharray="3,4">
      <line x1="113" y1="-113" x2="-160" y2="0"/>
    </g>

    <!-- seer's investigation beam -->
    <g stroke="#ffc857" stroke-opacity="0.55" stroke-width="1.2" stroke-dasharray="1,3">
      <line x1="160" y1="0" x2="113" y2="-113"/>
    </g>

    <!-- 8 player nodes around a radius of 160 -->
    <!-- positions: top, top-right, right, bottom-right, bottom, bottom-left, left, top-left -->
    <g font-family="'JetBrains Mono', monospace" font-size="14" font-weight="700" text-anchor="middle">
      <!-- villager (top) -->
      <circle cx="0"    cy="-160" r="24" fill="#5fb3a3" stroke="#0e0d0b" stroke-width="3"/>
      <text  x="0"    y="-155" fill="#0e0d0b">V</text>

      <!-- wolf (top-right) -->
      <circle cx="113"  cy="-113" r="24" fill="#ff5b1f" stroke="#0e0d0b" stroke-width="3"/>
      <text  x="113"  y="-108" fill="#0e0d0b">W</text>
      <!-- subtle danger ring on a wolf -->
      <circle cx="113" cy="-113" r="32" fill="none" stroke="#ff5b1f" stroke-opacity="0.35" stroke-width="1.5"/>

      <!-- seer (right) -->
      <circle cx="160"  cy="0"    r="24" fill="#ffc857" stroke="#0e0d0b" stroke-width="3"/>
      <text  x="160"  y="5"    fill="#0e0d0b">S</text>

      <!-- villager (bottom-right) -->
      <circle cx="113"  cy="113"  r="24" fill="#5fb3a3" stroke="#0e0d0b" stroke-width="3"/>
      <text  x="113"  y="118"  fill="#0e0d0b">V</text>

      <!-- doctor (bottom) -->
      <circle cx="0"    cy="160"  r="24" fill="#c594c5" stroke="#0e0d0b" stroke-width="3"/>
      <text  x="0"    y="165"  fill="#0e0d0b">D</text>

      <!-- villager (bottom-left) -->
      <circle cx="-113" cy="113"  r="24" fill="#5fb3a3" stroke="#0e0d0b" stroke-width="3"/>
      <text  x="-113" y="118"  fill="#0e0d0b">V</text>

      <!-- wolf (left) -->
      <circle cx="-160" cy="0"    r="24" fill="#ff5b1f" stroke="#0e0d0b" stroke-width="3"/>
      <text  x="-160" y="5"    fill="#0e0d0b">W</text>

      <!-- villager (top-left) -->
      <circle cx="-113" cy="-113" r="24" fill="#5fb3a3" stroke="#0e0d0b" stroke-width="3"/>
      <text  x="-113" y="-108" fill="#0e0d0b">V</text>
    </g>

    <!-- centre: the village -->
    <circle cx="0" cy="0" r="38" fill="#0e0d0b" stroke="#f4ecd8" stroke-opacity="0.35" stroke-width="1.5"/>
    <text x="0" y="-3" font-family="'Fraunces', serif" font-style="italic" font-size="14" fill="#b8ad94" text-anchor="middle">the</text>
    <text x="0" y="17" font-family="'Fraunces', serif" font-style="italic" font-weight="600" font-size="16" fill="#f4ecd8" text-anchor="middle">village</text>
  </g>

  <!-- ===================== LEFT SIDE: copy ===================== -->

  <!-- eyebrow -->
  <text x="62" y="115" font-family="'JetBrains Mono', monospace" font-size="13" font-weight="700" letter-spacing="3" fill="#ff5b1f">CODEV LABS × STEMLINK  •  MODULE 01  •  LIVE BUILD</text>

  <!-- main title -->
  <text font-family="'Fraunces', serif" fill="#f4ecd8">
    <tspan x="60" y="210" font-size="86" font-weight="300" letter-spacing="-2">Many minds,</tspan>
    <tspan x="60" y="300" font-size="86" font-weight="300" letter-spacing="-2" font-style="italic" fill="url(#titleGrad)">one problem.</tspan>
  </text>

  <!-- description -->
  <text x="60" y="370" font-family="'Fraunces', serif" font-size="23" font-weight="400" fill="#b8ad94">
    <tspan x="60" dy="0">Building multi-agent systems with <tspan font-weight="600" fill="#f4ecd8">Google ADK</tspan></tspan>
    <tspan x="60" dy="34" font-style="italic">— architecture, intuition, and a village that lies.</tspan>
  </text>

  <!-- pills -->
  <g font-family="'JetBrains Mono', monospace" font-size="13" font-weight="600">
    <g transform="translate(60,460)">
      <rect width="78" height="32" rx="16" fill="rgba(255,91,31,0.13)" stroke="#ff5b1f" stroke-opacity="0.55"/>
      <text x="39" y="21" text-anchor="middle" fill="#ff5b1f">ADK</text>
    </g>
    <g transform="translate(146,460)">
      <rect width="118" height="32" rx="16" fill="rgba(95,179,163,0.13)" stroke="#5fb3a3" stroke-opacity="0.55"/>
      <text x="59" y="21" text-anchor="middle" fill="#5fb3a3">Emergence</text>
    </g>
    <g transform="translate(272,460)">
      <rect width="118" height="32" rx="16" fill="rgba(255,200,87,0.13)" stroke="#ffc857" stroke-opacity="0.55"/>
      <text x="59" y="21" text-anchor="middle" fill="#ffc857">Stigmergy</text>
    </g>
    <g transform="translate(398,460)">
      <rect width="156" height="32" rx="16" fill="rgba(197,148,197,0.13)" stroke="#c594c5" stroke-opacity="0.55"/>
      <text x="78" y="21" text-anchor="middle" fill="#c594c5">Mafia Village</text>
    </g>
  </g>

  <!-- divider -->
  <line x1="60" y1="540" x2="700" y2="540" stroke="#f4ecd8" stroke-opacity="0.08"/>

  <!-- presented by -->
  <text x="60" y="572" font-family="'JetBrains Mono', monospace" font-size="12" font-weight="700" letter-spacing="3" fill="#ff5b1f">PRESENTED BY</text>
  <text x="60" y="606" font-family="'Fraunces', serif" font-size="26" font-weight="600" fill="#f4ecd8">K.A. Ashan Priyadarshana</text>

  <!-- right-bottom channel branding -->
  <text x="1140" y="606" font-family="'JetBrains Mono', monospace" font-size="13" font-weight="500" font-style="italic" text-anchor="end" fill="#b8ad94">Ashan Priyadarshana Explains</text>
</svg>
</body>
</html>
